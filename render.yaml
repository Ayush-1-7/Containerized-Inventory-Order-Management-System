# Render Blueprint (must live at the repo ROOT for auto-detection).
# In Render: New > Blueprint > select this repo. It provisions the API + free Postgres.
services:
  - type: web
    name: ioms-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ioms-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false # set to your Vercel URL after the frontend deploys, then redeploy
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: SEED_ON_STARTUP
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: ioms-db
    plan: free
    databaseName: ioms
    user: ioms
