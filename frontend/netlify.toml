[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes resolve.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set VITE_API_BASE_URL in the Netlify UI (Site settings > Environment variables)
# to your live backend URL, e.g. https://ioms-backend.onrender.com
